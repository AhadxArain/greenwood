kind = "web"
previewPath = "/"
title = "Greenwood General Contracting"
version = "1.0.0"
id = "artifacts/greenwood"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22740

[services.development]
run = "pnpm --filter @workspace/greenwood run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/greenwood", "run", "build" ]
publicDir = "artifacts/greenwood/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22740"
BASE_PATH = "/"
